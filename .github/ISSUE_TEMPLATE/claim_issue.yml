name: 🙋 Claim an Issue (GSSoC 2026)
description: Express your intent to work on an existing open issue as a GSSoC 2026 contributor.
title: "[CLAIM] I want to work on #<issue_number>"
labels: ["gssoc:approved"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Want to claim an issue? 🎓
        Use this template to formally request assignment to an existing open issue.

        **Steps:**
        1. Find an open issue you want to work on at [github.com/RatLoopz/sahidawa-india/issues](https://github.com/RatLoopz/sahidawa-india/issues)
        2. Read the issue description and acceptance criteria fully
        3. Fill out this form — a maintainer will assign you within 24–48 hours

        > ⚠️ Do NOT start coding before you are assigned. First-come, first-served — only one contributor per issue.

  - type: input
    id: issue_number
    attributes:
      label: Issue Number
      description: Which issue do you want to work on?
      placeholder: "e.g., #26"
    validations:
      required: true

  - type: input
    id: issue_title
    attributes:
      label: Issue Title
      placeholder: "e.g., Add Custom 404 Not Found Page"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level of the Issue
      options:
        - "🟢 Good First Issue"
        - "🟡 Intermediate"
        - "🔴 Advanced"
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Your Approach
      description: Briefly describe HOW you plan to implement this. This shows you've read the issue.
      placeholder: |
        I will create apps/web/app/not-found.tsx and use the Next.js App Router's built-in 404 handling.
        The page will match the existing dark emerald theme from scan/page.tsx.
    validations:
      required: true

  - type: input
    id: eta
    attributes:
      label: Estimated Completion Time
      placeholder: "e.g., 3 days / by May 20"
    validations:
      required: false

  - type: checkboxes
    id: prereqs
    attributes:
      label: Before You Start
      options:
        - label: I have read `docs/project-context.md` and `docs/code-guide.md`.
          required: true
        - label: I have set up the project locally and it runs without errors.
          required: true
        - label: I understand I should NOT submit a PR for a different issue than what's assigned to me.
          required: true

  - type: checkboxes
    id: gssoc
    attributes:
      label: GSSoC 2026
      options:
        - label: I am registered as a GSSoC 2026 contributor.
          required: false

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to SahiDawa's [Code of Conduct](https://github.com/RatLoopz/sahidawa-india/blob/main/CODE_OF_CONDUCT.md).
          required: true
