name-template: 'v$RESOLVED_VERSION 🩺'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'type:feature'
      - 'type:refactor'
  - title: '🐛 Bug Fixes'
    labels:
      - 'type:bug'
  - title: '🎨 UI & Design'
    labels:
      - 'type:design'
  - title: '📝 Documentation'
    labels:
      - 'type:docs'
  - title: '⚙️ Infrastructure & DevOps'
    labels:
      - 'type:devops'
      - 'ci-cd'
  - title: '🌐 Internationalization (i18n)'
    labels:
      - 'i18n'
  - title: '🛡️ Security'
    labels:
      - 'type:security'
  - title: '⚡ Performance'
    labels:
      - 'type:performance'
  - title: '🧪 Testing'
    labels:
      - 'type:testing'
  - title: '♿ Accessibility'
    labels:
      - 'type:accessibility'

change-template: '* $TITLE (#$NUMBER) by @$AUTHOR'

template: |
  ## What's Changed 🩺

  $CHANGES

  ---
  
  **Full Changelog**: https://github.com/RatLoopz/sahidawa-india/compare/$PREVIOUS_TAG...$NEXT_TAG
