name: SahiDawa CI / Test Suite
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

jobs:
    test-node-apps:
        name: 🧪 Build & Test Node.js Apps (Web & API)
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v6

            - name: ⚙️ Setup Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"

            - name: 📦 Install Dependencies (Monorepo)
              run: npm ci

            - name: 🏗️ Build Workspace Apps
              run: npm run build

            - name: 🧪 Run Tests
              run: npm run test

    test-ml-service:
        name: 🐍 Test Python ML Service (FastAPI)
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v6

            - name: ⚙️ Setup Python 3.12
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: 📦 Install ML Dependencies
              working-directory: ./apps/ml
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: 🔍 Check ML Syntax
              working-directory: ./apps/ml
              run: python -m py_compile main.py
