name: SahiDawa CI / Test Suite

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

jobs:
    test-node-apps:
        name: 🧪 Build & Test Node.js Apps (Web & API)
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v7

            - name: ⚙️ Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: 📦 Install Dependencies (Monorepo)
              run: npm ci

            - name: 🏗️ Build Workspace Apps
              run: npm run build

            - name: 🧪 Run Tests
              run: npm run test

    test-ml-service:
        name: 🐍 Test Python ML Service (FastAPI)
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v7

            - name: ⚙️ Setup Python 3.12
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: 📦 Install ML Dependencies
              working-directory: ./apps/ml
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: 🧪 Run ML Tests
              working-directory: ./apps/ml
              run: python -m pytest tests/ -v --timeout=60
              env:
                  WHISPER_MODEL_SIZE: base

    test-docker-builds:
        name: 🐳 Test Docker Builds
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v4

            - name: 🐳 Build Docker Images
              run: docker compose build

    check-formatting:
        name: 💅 Check Formatting
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v4

            - name: 🔍 Get Changed Files
              id: changed-files
              uses: tj-actions/changed-files@v45
              with:
                  separator: " "

            - name: 💅 Run Prettier on Changed Files
              if: steps.changed-files.outputs.any_changed == 'true'
              run: |
                  FILES="${{ steps.changed-files.outputs.all_changed_files }}"
                  if [ -n "$FILES" ]; then
                      npx prettier --ignore-unknown --check $FILES || echo "Prettier found issues. Ignoring failure as requested."
                  fi
